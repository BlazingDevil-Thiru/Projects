<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayTrack Pro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s ease; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-card:hover { transform: translateY(-2px); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-12">

    <nav class="bg-white border-b border-slate-200 mb-8 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-bolt text-sm"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">PayTrack<span class="text-indigo-600">.</span></span>
                <span id="roomBadge" class="ml-2 text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full font-semibold"></span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="copyShareLink()" class="text-sm font-semibold bg-indigo-600 text-white px-4 py-2 rounded-full hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <i class="fas fa-share-alt text-xs"></i> Share
                </button>
                <button onclick="exportToCSV()" class="text-sm font-semibold bg-slate-900 text-white px-4 py-2 rounded-full hover:bg-slate-800 transition-all flex items-center gap-2">
                    <i class="fas fa-download text-xs"></i> Export CSV
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4">
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Spend</span>
                    <i class="fas fa-chart-line text-indigo-500"></i>
                </div>
                <p id="statTotal" class="text-3xl font-bold">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Days Logged</span>
                    <i class="fas fa-calendar-check text-emerald-500"></i>
                </div>
                <p id="statDays" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-indigo-600 p-6 rounded-3xl shadow-xl shadow-indigo-100 text-white">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-indigo-200 text-xs font-bold uppercase tracking-widest">Daily Average</span>
                    <i class="fas fa-coins text-indigo-300"></i>
                </div>
                <p id="statAvg" class="text-3xl font-bold text-white">₹0</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm mb-6 flex flex-col md:flex-row md:items-center gap-6">
            <div class="flex-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1">Entry Amount</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
                    <input type="number" id="priceInput" placeholder="Enter amount..." 
                        class="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 outline-none font-bold text-xl transition-all">
                </div>
            </div>
            
            <div class="h-12 w-px bg-slate-100 hidden md:block"></div>

            <div class="flex items-center justify-between gap-4">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1">Browse Month</span>
                    <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-2xl border border-slate-100">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white hover:shadow-sm transition-all text-slate-600"><i class="fas fa-chevron-left"></i></button>
                        <span id="monthLabel" class="px-4 font-bold text-sm min-w-[140px] text-center"></span>
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white hover:shadow-sm transition-all text-slate-600"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 sm:p-8 rounded-[2.5rem] border border-slate-200 shadow-sm relative">
            <div class="calendar-grid mb-6">
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Sun</div>
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Mon</div>
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Tue</div>
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Wed</div>
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Thu</div>
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Fri</div>
                <div class="py-2 text-[10px] font-black text-slate-300 text-center tracking-tighter uppercase">Sat</div>
            </div>
            <div id="calendarDays" class="calendar-grid gap-3 sm:gap-4"></div>
        </div>

        <div class="mt-12 flex flex-col items-center gap-4">
            <p class="text-slate-400 text-xs italic">Data syncs to cloud. Share your link to collaborate!</p>
            <div class="flex gap-4">
                <button onclick="createNewRoom()" class="text-indigo-500 hover:text-indigo-600 text-[10px] font-bold uppercase tracking-[0.2em] transition-colors">
                    <i class="fas fa-plus mr-2"></i> New Room
                </button>
                <button onclick="clearData()" class="text-slate-400 hover:text-red-500 text-[10px] font-bold uppercase tracking-[0.2em] transition-colors">
                    <i class="fas fa-trash-alt mr-2"></i> Reset Database
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all pointer-events-none transform translate-y-4">
        <span id="toastMsg" class="text-sm font-medium"></span>
    </div>

    <script>
        // JSONBlob - Simple free cloud storage (no signup needed)
        const API_BASE = 'https://jsonblob.com/api/jsonBlob';
        
        let currentViewDate = new Date();
        let paymentData = {};
        let blobId = '';
        let saveTimeout = null;

        // Get or create blob ID from URL
        function getBlobId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // Update URL with blob ID
        function updateUrl(id) {
            const newUrl = `${window.location.pathname}?id=${id}`;
            window.history.replaceState({}, '', newUrl);
        }

        // Create new blob
        async function createBlob(data) {
            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const location = response.headers.get('Location');
                return location ? location.split('/').pop() : null;
            } catch (e) {
                console.error('Create error:', e);
                return null;
            }
        }

        // Load blob data
        async function loadBlob(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                if (response.ok) return await response.json();
            } catch (e) {
                console.error('Load error:', e);
            }
            return null;
        }

        // Save blob data (debounced)
        function saveBlob() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                if (!blobId) return;
                try {
                    await fetch(`${API_BASE}/${blobId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(paymentData)
                    });
                } catch (e) {
                    console.error('Save error:', e);
                    showToast('Save failed. Check connection.');
                }
            }, 500);
        }

        // Initialize app
        async function initApp() {
            blobId = getBlobId();
            
            if (blobId) {
                // Load existing data
                document.getElementById('roomBadge').innerText = `ID: ${blobId.slice(0,8)}...`;
                const data = await loadBlob(blobId);
                if (data) {
                    paymentData = data;
                    showToast('Data loaded!');
                } else {
                    showToast('Could not load data. Starting fresh.');
                    paymentData = {};
                }
            } else {
                // Create new blob
                showToast('Creating new tracker...');
                const newId = await createBlob({});
                if (newId) {
                    blobId = newId;
                    updateUrl(blobId);
                    document.getElementById('roomBadge').innerText = `ID: ${blobId.slice(0,8)}...`;
                    showToast('New tracker created! Share the link.');
                } else {
                    showToast('Offline mode - using local storage');
                    paymentData = JSON.parse(localStorage.getItem('paytrack_local')) || {};
                }
            }
            render();
        }

        function createNewRoom() {
            if (confirm('Create a new tracker? You can share the new link with others.')) {
                window.location.href = window.location.pathname;
            }
        }

        function copyShareLink() {
            const shareUrl = window.location.href;
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('Link copied! Share it with others.');
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = shareUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('Link copied!');
            });
        }

        function getColorClass(price) {
            price = parseFloat(price);
            if (price === 0) return 'bg-red-50 text-red-600 border-red-100 hover:bg-red-100';
            if (price < 100) return 'bg-orange-50 text-orange-600 border-orange-100 hover:bg-orange-100';
            if (price >= 100 && price < 500) return 'bg-emerald-50 text-emerald-600 border-emerald-100 hover:bg-emerald-100';
            if (price >= 500 && price <= 1000) return 'bg-blue-50 text-blue-600 border-blue-100 hover:bg-blue-100';
            if (price > 1000) return 'bg-purple-50 text-purple-600 border-purple-100 hover:bg-purple-100';
            return 'bg-white text-slate-300 border-slate-100 hover:border-indigo-200';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            toast.classList.replace('translate-y-4', 'translate-y-0');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('translate-y-0', 'translate-y-4');
            }, 2000);
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            render();
        }

        function markDay(dayKey, dayNum) {
            const inputVal = document.getElementById('priceInput').value;
            const amount = inputVal === "" ? 0 : parseFloat(inputVal);
            
            paymentData[dayKey] = amount;
            saveBlob();
            localStorage.setItem('paytrack_local', JSON.stringify(paymentData));
            showToast(`Day ${dayNum} → ₹${amount}`);
            render();
        }

        function exportToCSV() {
            if (Object.keys(paymentData).length === 0) {
                alert("No data found to export!");
                return;
            }
            let csv = "Date,Amount\n";
            Object.keys(paymentData).sort().forEach(key => {
                csv += `${key},${paymentData[key]}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `PayTrack_${new Date().toISOString().slice(0,10)}.csv`);
            a.click();
        }

        function render() {
            const container = document.getElementById('calendarDays');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            document.getElementById('monthLabel').innerText = currentViewDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            container.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="aspect-square opacity-0"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayKey = `${year}-${month}-${d}`;
                const savedPrice = paymentData[dayKey];
                const hasValue = savedPrice !== undefined;
                const colorClass = hasValue ? getColorClass(savedPrice) : 'bg-white border-slate-100 hover:bg-slate-50 text-slate-300';
                
                container.innerHTML += `
                    <button onclick="markDay('${dayKey}', ${d})" 
                        class="day-card aspect-square border-2 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 ${colorClass}">
                        <span class="text-[10px] font-black uppercase mb-1">${d}</span>
                        <span class="text-xs font-bold">${hasValue ? '₹' + savedPrice : ''}</span>
                    </button>
                `;
            }
            updateStats();
        }

        function updateStats() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            const monthlyEntries = Object.entries(paymentData)
                .filter(([key]) => key.startsWith(`${year}-${month}-`))
                .map(([, value]) => value);

            const total = monthlyEntries.reduce((a, b) => a + b, 0);
            const paidDays = monthlyEntries.filter(v => v > 0).length;
            const avg = paidDays > 0 ? (total / paidDays).toFixed(0) : 0;

            document.getElementById('statDays').innerText = paidDays;
            document.getElementById('statTotal').innerText = '₹' + total.toLocaleString();
            document.getElementById('statAvg').innerText = '₹' + avg.toLocaleString();
        }

        async function clearData() {
            if(confirm('Are you sure? This will delete all payment history permanently.')) {
                paymentData = {};
                saveBlob();
                localStorage.removeItem('paytrack_local');
                render();
                showToast("Database Cleared");
            }
        }

        // Start the app
        initApp();
    </script>
</body>
</html>
